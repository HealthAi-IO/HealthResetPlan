name: health_reset_plan
description: "健康重启计划 - 针对三高与肥胖人群的智能健康管理客户端"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 路由 / DI
  go_router: ^14.6.2
  get_it: ^8.0.3

  # 网络
  dio: ^5.7.0

  # 本地存储 + 同步
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0

  # 安全存储 + 加密
  flutter_secure_storage: ^9.2.4
  cryptography: ^2.7.0
  bip39: ^1.0.6

  # 本地通知
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^5.0.0

  # 系统闹钟集成（Android ACTION_SET_ALARM）
  android_intent_plus: ^5.1.0

  # 图片选择（相机/相册）
  image_picker: ^1.1.2

  # 数据导出与导入
  share_plus: ^10.0.3
  file_picker: ^8.1.6

  # UI / 工具
  intl: ^0.20.2
  logger: ^2.4.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
